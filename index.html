<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vocabulary">
    <title>Vocabulary Cards</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }

        /* Top bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10,14,26,0.97) 0%, rgba(10,14,26,0.8) 70%, transparent 100%);
            z-index: 10;
        }

        .logo {
            font-size: 13px;
            font-weight: 700;
            color: #4a7af5;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .counter {
            font-size: 14px;
            font-weight: 600;
            color: #8899bb;
            background: rgba(74, 122, 245, 0.1);
            border: 1px solid rgba(74, 122, 245, 0.2);
            padding: 5px 14px;
            border-radius: 20px;
        }

        .counter span {
            color: #4a7af5;
            font-weight: 900;
        }

        /* Cards container */
        .cards-container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            justify-content: center;
            transition: opacity 0.2s ease, transform 0.2s ease;
            padding: 0 20px;
            max-width: 1000px;
            width: 100%;
        }

        .cards-container.fade-out {
            opacity: 0;
            transform: scale(0.96);
        }

        .cards-container.fade-in {
            opacity: 1;
            transform: scale(1);
        }

        /* Card wrapper */
        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 1;
            max-width: 460px;
        }

        .card {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 
                0 4px 20px rgba(0,0,0,0.4),
                0 0 40px rgba(74, 122, 245, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid rgba(74, 122, 245, 0.12);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 8px 28px rgba(0,0,0,0.5),
                0 0 60px rgba(74, 122, 245, 0.12);
            border-color: rgba(74, 122, 245, 0.25);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .card-label {
            font-size: 13px;
            font-weight: 600;
            color: #667799;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .card-number {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(74, 122, 245, 0.12);
            border: 1px solid rgba(74, 122, 245, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #4a7af5;
        }

        /* Translation */
        .card-translation {
            font-size: 13px;
            font-weight: 600;
            color: #a0b8e8;
            text-align: center;
            padding: 6px 14px;
            background: rgba(74, 122, 245, 0.08);
            border: 1px solid rgba(74, 122, 245, 0.15);
            border-radius: 8px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease, margin 0.3s ease;
            padding: 0 14px;
            margin-top: 0;
        }

        .card-translation.visible {
            max-height: 60px;
            opacity: 1;
            padding: 6px 14px;
            margin-top: 4px;
        }

        /* Bottom bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 14px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: linear-gradient(0deg, rgba(10,14,26,0.97) 0%, rgba(10,14,26,0.8) 70%, transparent 100%);
            z-index: 10;
        }

        .hint {
            font-size: 11px;
            color: #3a4a5a;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hint kbd {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            color: #556677;
        }

        /* Progress bar */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, #4a7af5, #7c5af5);
            transition: width 0.3s ease;
            z-index: 20;
        }

        /* Nav arrows - desktop only */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(74, 122, 245, 0.06);
            border: 1px solid rgba(74, 122, 245, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a7af5;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
            opacity: 0.4;
        }

        .nav-arrow:hover {
            opacity: 1;
            background: rgba(74, 122, 245, 0.12);
        }

        .nav-arrow.left { left: 10px; }
        .nav-arrow.right { right: 10px; }
        .nav-arrow.disabled { opacity: 0.1; pointer-events: none; }

        /* Swipe indicator for mobile */
        .swipe-hint {
            display: none;
            font-size: 11px;
            color: #3a4a5a;
            text-align: center;
        }

        /* ===== RESPONSIVE - MOBILE ===== */
        @media (max-width: 700px) {
            .cards-container {
                flex-direction: column;
                align-items: center;
                gap: 16px;
                padding: 0 16px;
            }

            .card-wrapper {
                max-width: 360px;
                width: 100%;
            }

            .card {
                border-radius: 12px;
            }

            .nav-arrow {
                display: none;
            }

            .swipe-hint {
                display: block;
            }

            .hint kbd {
                display: none;
            }

            .hint {
                display: none;
            }

            .bottom-bar {
                padding: 10px 16px;
                gap: 10px;
            }

            .top-bar {
                padding: 10px 14px;
            }
        }

        /* Tablet */
        @media (min-width: 701px) and (max-width: 1024px) {
            .card-wrapper {
                max-width: 380px;
            }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: #445566;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #667788;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">📚 Vocabulary</div>
        <div class="counter" id="counter">
            <span id="current-pair">0</span> / <span id="total-pairs">0</span>
        </div>
    </div>

    <div class="nav-arrow left" id="nav-left" onclick="prevPair(); event.stopPropagation();">◀</div>
    <div class="nav-arrow right" id="nav-right" onclick="nextPair(); event.stopPropagation();">▶</div>

    <div class="cards-container" id="cards-container">
        <div class="empty-state">
            <h2>Yükleniyor...</h2>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="hint"><kbd>←</kbd> Geri</div>
        <div class="hint"><kbd>→</kbd> İleri</div>
        <div class="hint"><kbd>Çift Tık</kbd> Çeviri</div>
        <div class="swipe-hint">← Kaydır → &nbsp;|&nbsp; Çift dokun: Çeviri</div>
    </div>

    <div class="progress-bar" id="progress-bar"></div>

    <script>
        let cards = [];
        let currentPairIndex = 0;
        let totalPairs = 0;
        let translationsVisible = {};

        // Load cards data
        async function loadCards() {
            try {
                const response = await fetch('cards_data.json');
                cards = await response.json();
                totalPairs = Math.ceil(cards.length / 2);
                document.getElementById('total-pairs').textContent = totalPairs;
                showPair(0);
            } catch (err) {
                document.getElementById('cards-container').innerHTML = `
                    <div class="empty-state">
                        <h2>❌ Veri yüklenemedi</h2>
                        <p>cards_data.json dosyası bulunamadı.</p>
                    </div>
                `;
            }
        }

        function showPair(index) {
            if (index < 0 || index >= totalPairs) return;
            
            currentPairIndex = index;
            translationsVisible = {};
            const container = document.getElementById('cards-container');
            
            container.classList.add('fade-out');
            container.classList.remove('fade-in');
            
            setTimeout(() => {
                const startIdx = index * 2;
                const card1 = cards[startIdx];
                const card2 = cards[startIdx + 1];
                
                let html = '';
                
                if (card1) {
                    html += buildCardHTML(card1, 0);
                }
                
                if (card2) {
                    html += buildCardHTML(card2, 1);
                }
                
                container.innerHTML = html;
                
                // Update counter
                document.getElementById('current-pair').textContent = index + 1;
                
                // Progress bar
                const progress = ((index + 1) / totalPairs) * 100;
                document.getElementById('progress-bar').style.width = progress + '%';
                
                // Nav arrows
                document.getElementById('nav-left').classList.toggle('disabled', index === 0);
                document.getElementById('nav-right').classList.toggle('disabled', index >= totalPairs - 1);
                
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
            }, 120);
        }

        function buildCardHTML(card, position) {
            const tr = card.tr || '';
            return `
                <div class="card-wrapper" data-position="${position}" ondblclick="toggleTranslation(${position}); event.stopPropagation();">
                    <div class="card-number">${card.index}</div>
                    <div class="card">
                        <img src="cards/${card.file}" alt="${card.text}" loading="eager">
                    </div>
                    <div class="card-label">${card.text}</div>
                    <div class="card-translation" id="translation-${position}">${tr}</div>
                </div>
            `;
        }

        function toggleTranslation(position) {
            const el = document.getElementById('translation-' + position);
            if (!el) return;
            
            if (translationsVisible[position]) {
                el.classList.remove('visible');
                translationsVisible[position] = false;
            } else {
                el.classList.add('visible');
                translationsVisible[position] = true;
            }
        }

        function nextPair() {
            if (currentPairIndex < totalPairs - 1) {
                showPair(currentPairIndex + 1);
            }
        }

        function prevPair() {
            if (currentPairIndex > 0) {
                showPair(currentPairIndex - 1);
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                nextPair();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                prevPair();
            } else if (e.key === 'Home') {
                e.preventDefault();
                showPair(0);
            } else if (e.key === 'End') {
                e.preventDefault();
                showPair(totalPairs - 1);
            }
        });

        // Click navigation (single click only - not on card wrappers with dblclick)
        let clickTimer = null;
        let lastClickTime = 0;

        document.addEventListener('click', (e) => {
            if (e.target.closest('.nav-arrow')) return;
            if (e.target.closest('.card-wrapper')) return;
            
            nextPair();
        });

        // Right click = go back
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            prevPair();
        });

        // Touch swipe for mobile
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            touchStartTime = Date.now();
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;
            const elapsed = Date.now() - touchStartTime;

            // Swipe (not a tap)
            if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY) && elapsed < 500) {
                if (diffX > 0) {
                    nextPair(); // Swipe left = next
                } else {
                    prevPair(); // Swipe right = prev
                }
            }
        }, { passive: true });

        // Load on start
        loadCards();
    </script>
</body>
</html>
