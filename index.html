<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vocabulary">
    <title>Vocabulary Cards</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family:'Inter',sans-serif; background:#0a0e1a; color:#e0e0e0;
            min-height:100vh; min-height:100dvh; display:flex; flex-direction:column;
            align-items:center; justify-content:center; overflow:hidden;
            user-select:none; -webkit-user-select:none; cursor:pointer;
        }

        .top-bar {
            position:fixed; top:0; left:0; right:0; padding:12px 16px;
            display:flex; justify-content:space-between; align-items:center;
            background:linear-gradient(180deg,rgba(10,14,26,0.97) 0%,rgba(10,14,26,0.8) 70%,transparent 100%);
            z-index:10;
        }
        .logo { font-size:13px; font-weight:700; color:#4a7af5; letter-spacing:1.5px; text-transform:uppercase; }
        .top-right { display:flex; align-items:center; gap:10px; }
        .counter {
            font-size:14px; font-weight:600; color:#8899bb;
            background:rgba(74,122,245,0.1); border:1px solid rgba(74,122,245,0.2);
            padding:5px 14px; border-radius:20px;
        }
        .counter span { color:#4a7af5; font-weight:900; }
        .api-btn {
            font-size:11px; font-weight:600; padding:5px 10px; border-radius:16px;
            border:1px solid rgba(74,122,245,0.25); background:rgba(74,122,245,0.08);
            color:#4a7af5; cursor:pointer; transition:all 0.2s;
        }
        .api-btn:hover { background:rgba(74,122,245,0.18); }
        .api-btn.active { border-color:#28a745; color:#28a745; background:rgba(40,167,69,0.1); }

        .cards-container {
            display:flex; gap:24px; align-items:flex-start; justify-content:center;
            transition:opacity 0.2s ease,transform 0.2s ease;
            padding:0 20px; max-width:1100px; width:100%;
        }
        .cards-container.fade-out { opacity:0; transform:scale(0.96); }
        .cards-container.fade-in { opacity:1; transform:scale(1); }

        .card-wrapper {
            display:flex; flex-direction:column; align-items:center; gap:8px;
            flex:1; max-width:480px;
        }
        .card {
            width:100%; border-radius:14px; overflow:hidden;
            box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 40px rgba(74,122,245,0.06);
            transition:transform 0.3s ease,box-shadow 0.3s ease;
            border:2px solid rgba(74,122,245,0.12);
        }
        .card:hover {
            transform:translateY(-3px);
            box-shadow:0 8px 28px rgba(0,0,0,0.5),0 0 60px rgba(74,122,245,0.12);
            border-color:rgba(74,122,245,0.25);
        }
        .card img { width:100%; height:auto; display:block; }

        .card-label { font-size:13px; font-weight:600; color:#667799; text-align:center; }
        .card-number {
            width:26px; height:26px; border-radius:50%;
            background:rgba(74,122,245,0.12); border:1px solid rgba(74,122,245,0.2);
            display:flex; align-items:center; justify-content:center;
            font-size:10px; font-weight:700; color:#4a7af5;
        }

        /* Çeviri kutusu */
        .card-translation {
            font-size:13px; font-weight:600; color:#a0b8e8; text-align:center;
            padding:6px 14px; background:rgba(74,122,245,0.08);
            border:1px solid rgba(74,122,245,0.15); border-radius:8px;
            max-height:0; overflow:hidden; opacity:0;
            transition:max-height 0.3s ease,opacity 0.3s ease,padding 0.3s ease;
            padding:0 14px;
        }
        .card-translation.visible { max-height:60px; opacity:1; padding:6px 14px; }

        /* AI buton + sonuç */
        .card-actions { display:flex; gap:6px; align-items:center; }
        .ai-btn {
            font-size:11px; font-weight:700; padding:4px 10px; border-radius:12px;
            border:1px solid rgba(168,85,247,0.3); background:rgba(168,85,247,0.1);
            color:#a855f7; cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .ai-btn:hover { background:rgba(168,85,247,0.2); border-color:rgba(168,85,247,0.5); }
        .ai-btn.loading { opacity:0.5; pointer-events:none; }

        .ai-result {
            font-size:12px; color:#c4b5fd; text-align:left; line-height:1.6;
            padding:10px 14px; background:rgba(168,85,247,0.06);
            border:1px solid rgba(168,85,247,0.15); border-radius:10px;
            max-height:0; overflow:hidden; opacity:0; width:100%;
            transition:max-height 0.4s ease,opacity 0.3s ease,padding 0.3s ease;
            padding:0 14px; user-select:text; cursor:text;
        }
        .ai-result.visible { max-height:300px; opacity:1; padding:10px 14px; overflow-y:auto; }
        .ai-result strong { color:#a855f7; }
        .ai-result em { color:#818cf8; font-style:normal; }

        .bottom-bar {
            position:fixed; bottom:0; left:0; right:0; padding:14px 16px;
            display:flex; justify-content:center; align-items:center; gap:16px; flex-wrap:wrap;
            background:linear-gradient(0deg,rgba(10,14,26,0.97) 0%,rgba(10,14,26,0.8) 70%,transparent 100%);
            z-index:10;
        }
        .hint { font-size:11px; color:#3a4a5a; display:flex; align-items:center; gap:4px; }
        .hint kbd {
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
            border-radius:4px; padding:1px 6px; font-family:'Inter',sans-serif;
            font-size:10px; color:#556677;
        }
        .progress-bar {
            position:fixed; bottom:0; left:0; height:2px;
            background:linear-gradient(90deg,#4a7af5,#7c5af5);
            transition:width 0.3s ease; z-index:20;
        }
        .nav-arrow {
            position:fixed; top:50%; transform:translateY(-50%);
            width:40px; height:40px; border-radius:50%;
            background:rgba(74,122,245,0.06); border:1px solid rgba(74,122,245,0.12);
            display:flex; align-items:center; justify-content:center;
            color:#4a7af5; font-size:16px; cursor:pointer;
            transition:all 0.2s; z-index:10; opacity:0.4;
        }
        .nav-arrow:hover { opacity:1; background:rgba(74,122,245,0.12); }
        .nav-arrow.left { left:10px; }
        .nav-arrow.right { right:10px; }
        .nav-arrow.disabled { opacity:0.1; pointer-events:none; }

        .swipe-hint { display:none; font-size:11px; color:#3a4a5a; text-align:center; }

        /* Kelime arama */
        .search-bar {
            position:fixed; bottom:46px; left:50%; transform:translateX(-50%);
            display:flex; gap:6px; align-items:center; z-index:15;
            background:rgba(15,20,35,0.95); border:1px solid rgba(168,85,247,0.2);
            border-radius:12px; padding:5px 6px 5px 14px; max-width:460px; width:90%;
            backdrop-filter:blur(8px);
        }
        .search-bar input {
            flex:1; background:none; border:none; color:#e0e0e0; font-size:14px;
            font-family:'Inter',sans-serif; outline:none;
        }
        .search-bar input::placeholder { color:#445566; }
        .search-bar button {
            padding:6px 12px; border:none; border-radius:8px; background:#a855f7;
            color:white; font-family:'Inter',sans-serif; font-size:12px;
            font-weight:700; cursor:pointer; white-space:nowrap;
        }
        .search-bar button:hover { background:#9333ea; }
        .lookup-result {
            position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
            max-width:460px; width:90%; z-index:15;
            font-size:12px; color:#c4b5fd; text-align:left; line-height:1.6;
            padding:0; background:rgba(168,85,247,0.08);
            border:1px solid rgba(168,85,247,0.2); border-radius:12px;
            max-height:0; overflow:hidden; opacity:0;
            transition:max-height 0.4s ease,opacity 0.3s ease,padding 0.3s ease;
            user-select:text; cursor:text;
        }
        .lookup-result.visible { max-height:250px; opacity:1; padding:12px 16px; overflow-y:auto; }
        .lookup-result strong { color:#a855f7; }
        .lookup-result em { color:#818cf8; font-style:normal; }
        .lookup-result .lookup-word { font-size:14px; font-weight:700; color:#a855f7; margin-bottom:6px; }
        .lookup-result .close-btn {
            position:absolute; top:6px; right:8px; background:none; border:none;
            color:#667799; font-size:14px; cursor:pointer;
        }

        /* Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100;
            display:flex; align-items:center; justify-content:center;
            backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
        }
        .modal-overlay.hidden { display:none; }
        .modal {
            background:#111827; border:1px solid rgba(74,122,245,0.2);
            border-radius:16px; padding:28px; max-width:400px; width:90%;
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h2 { font-size:18px; color:#e0e0e0; margin-bottom:6px; }
        .modal p { font-size:13px; color:#667799; margin-bottom:16px; line-height:1.5; }
        .modal input {
            width:100%; padding:10px 14px; border-radius:8px; border:1px solid rgba(74,122,245,0.2);
            background:#0a0e1a; color:#e0e0e0; font-size:13px; font-family:'Inter',sans-serif;
            outline:none; margin-bottom:12px;
        }
        .modal input:focus { border-color:#4a7af5; }
        .modal-btns { display:flex; gap:8px; }
        .modal-btns button {
            flex:1; padding:10px; border:none; border-radius:8px;
            font-family:'Inter',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
        }
        .btn-save { background:#4a7af5; color:white; }
        .btn-save:hover { background:#5a8aff; }
        .btn-skip { background:rgba(255,255,255,0.05); color:#667799; border:1px solid rgba(255,255,255,0.08) !important; }
        .btn-skip:hover { background:rgba(255,255,255,0.1); }

        @media (max-width:700px) {
            .cards-container { flex-direction:column; align-items:center; gap:16px; padding:0 16px; }
            .card-wrapper { max-width:360px; width:100%; }
            .card { border-radius:12px; }
            .nav-arrow { display:none; }
            .swipe-hint { display:block; }
            .hint { display:none; }
            .bottom-bar { padding:10px 16px; gap:10px; }
            .top-bar { padding:10px 14px; }
        }
        @media (min-width:701px) and (max-width:1024px) {
            .card-wrapper { max-width:380px; }
        }
        .empty-state { text-align:center; color:#445566; }
        .empty-state h2 { font-size:20px; margin-bottom:10px; color:#667788; }
    </style>
</head>
<body>

<!-- API Key Modal -->
<div class="modal-overlay" id="api-modal">
    <div class="modal">
        <h2>🤖 Gemini AI Çeviri</h2>
        <p>Kartlardaki kelimelerin detaylı Türkçe anlamlarını görmek için Gemini API anahtarı gerekiyor. Anahtarın var mı?</p>
        <input type="text" id="api-key-input" placeholder="API anahtarını buraya yapıştır...">
        <div class="modal-btns">
            <button class="btn-skip" onclick="skipApiKey()">Yok / Sonra</button>
            <button class="btn-save" onclick="saveApiKey()">Kaydet</button>
        </div>
    </div>
</div>

<div class="top-bar">
    <div class="logo">📚 Vocabulary</div>
    <div class="top-right">
        <button class="api-btn" onclick="location.reload()" title="Sayfayı yenile">🔄</button>
        <button class="api-btn" id="api-status-btn" onclick="showApiModal()">🔑 API</button>
        <div class="counter">
            <span id="current-pair">0</span> / <span id="total-pairs">0</span>
        </div>
    </div>
</div>

<div class="nav-arrow left" id="nav-left" onclick="prevPair(); event.stopPropagation();">◀</div>
<div class="nav-arrow right" id="nav-right" onclick="nextPair(); event.stopPropagation();">▶</div>

<div class="cards-container" id="cards-container">
    <div class="empty-state"><h2>Yükleniyor...</h2></div>
</div>

<div class="lookup-result" id="lookup-result"></div>
<div class="search-bar" onclick="event.stopPropagation();">
    <input type="text" id="search-input" placeholder="Kelime yaz, Enter bas..." autocomplete="off">
    <button onclick="doLookup()">✨ Ara</button>
</div>

<div class="bottom-bar">
    <div class="hint"><kbd>←</kbd> Geri</div>
    <div class="hint"><kbd>→</kbd> İleri</div>
    <div class="hint"><kbd>Tık</kbd> İleri</div>
    <div class="hint"><kbd>Çift Tık</kbd> Çeviri</div>
    <div class="hint"><kbd>✨</kbd> AI</div>
    <div class="swipe-hint">← Kaydır → &nbsp;|&nbsp; Çift dokun: Çeviri</div>
</div>
<div class="progress-bar" id="progress-bar"></div>

<script>
var cards = [];
var currentPairIndex = 0;
var totalPairs = 0;
var translationsVisible = {};
var aiResults = {};
var apiKey = localStorage.getItem('gemini_api_key') || '';

// API Key Modal
function initApiModal() {
    if (apiKey) {
        document.getElementById('api-modal').classList.add('hidden');
        document.getElementById('api-status-btn').classList.add('active');
        document.getElementById('api-status-btn').textContent = '✅ AI';
    }
}

function showApiModal() {
    var modal = document.getElementById('api-modal');
    modal.classList.remove('hidden');
    var input = document.getElementById('api-key-input');
    input.value = apiKey;
    input.focus();
}

function saveApiKey() {
    var key = document.getElementById('api-key-input').value.trim();
    if (key) {
        apiKey = key;
        localStorage.setItem('gemini_api_key', key);
        document.getElementById('api-modal').classList.add('hidden');
        document.getElementById('api-status-btn').classList.add('active');
        document.getElementById('api-status-btn').textContent = '✅ AI';
    }
}

function skipApiKey() {
    document.getElementById('api-modal').classList.add('hidden');
}

// Enter ile kaydet
document.getElementById('api-key-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveApiKey();
});

// Cards
function loadCards() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'cards_data.json', true);
    xhr.onload = function() {
        if (xhr.status === 200) {
            cards = JSON.parse(xhr.responseText);
            totalPairs = Math.ceil(cards.length / 2);
            document.getElementById('total-pairs').textContent = totalPairs;
            showPair(0);
        }
    };
    xhr.onerror = function() {
        document.getElementById('cards-container').innerHTML =
            '<div class="empty-state"><h2>Veri yüklenemedi</h2></div>';
    };
    xhr.send();
}

function showPair(index) {
    if (index < 0 || index >= totalPairs) return;
    currentPairIndex = index;
    translationsVisible = {};
    var container = document.getElementById('cards-container');
    container.classList.add('fade-out');
    container.classList.remove('fade-in');

    setTimeout(function() {
        var startIdx = index * 2;
        var card1 = cards[startIdx];
        var card2 = cards[startIdx + 1];
        var html = '';
        if (card1) html += buildCardHTML(card1, 0);
        if (card2) html += buildCardHTML(card2, 1);
        container.innerHTML = html;
        document.getElementById('current-pair').textContent = index + 1;
        var progress = ((index + 1) / totalPairs) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
        document.getElementById('nav-left').classList.toggle('disabled', index === 0);
        document.getElementById('nav-right').classList.toggle('disabled', index >= totalPairs - 1);
        container.classList.remove('fade-out');
        container.classList.add('fade-in');

        // Önceden yüklenmiş AI sonuçlarını göster
        if (card1 && aiResults[card1.index]) showAiResult(0, aiResults[card1.index]);
        if (card2 && aiResults[card2.index]) showAiResult(1, aiResults[card2.index]);
    }, 120);
}

function buildCardHTML(card, position) {
    var tr = card.tr || '';
    var hasApi = apiKey ? '' : ' style="opacity:0.3;pointer-events:none" title="API anahtarı gerekli"';
    return '<div class="card-wrapper" data-position="' + position + '" ondblclick="toggleTranslation(' + position + '); event.stopPropagation();">' +
        '<div class="card-number">' + card.index + '</div>' +
        '<div class="card"><img src="cards/' + card.file + '" alt="' + card.text + '" loading="eager"></div>' +
        '<div class="card-label">' + card.text + '</div>' +
        '<div class="card-translation" id="translation-' + position + '">' + tr + '</div>' +
        '<div class="card-actions">' +
            '<button class="ai-btn" id="ai-btn-' + position + '" onclick="askGemini(' + position + ',' + card.index + ',\'' + card.text.replace(/'/g, "\\'") + '\'); event.stopPropagation();"' + hasApi + '>✨ AI</button>' +
        '</div>' +
        '<div class="ai-result" id="ai-result-' + position + '"></div>' +
    '</div>';
}

function toggleTranslation(position) {
    var el = document.getElementById('translation-' + position);
    if (!el) return;
    if (translationsVisible[position]) {
        el.classList.remove('visible');
        translationsVisible[position] = false;
    } else {
        el.classList.add('visible');
        translationsVisible[position] = true;
    }
}

function nextPair() {
    if (currentPairIndex < totalPairs - 1) showPair(currentPairIndex + 1);
}
function prevPair() {
    if (currentPairIndex > 0) showPair(currentPairIndex - 1);
}

// Gemini AI
function askGemini(position, cardIndex, word) {
    if (!apiKey) { showApiModal(); return; }

    var btn = document.getElementById('ai-btn-' + position);
    btn.classList.add('loading');
    btn.textContent = '⏳';

    var prompt = 'İngilizce kelime/ifade: "' + word + '"\n\n' +
        'Bu kelimenin/ifadenin Türkçe karşılığını ver. Kurallar:\n' +
        '1. En yaygın 4 anlamını yaz (varsa). Her anlam için kelime türünü belirt (isim, fiil, sıfat vs.)\n' +
        '2. Çok doğal, günlük Türkçe kullan\n' +
        '3. Eğer bu bir deyim/idiom ise kısa ve net açıkla\n' +
        '4. Eğer tek kelimeyle açıklanamıyorsa çok kısa bir açıklama ekle\n' +
        '5. Cevabı şu formatta ver, başka bir şey yazma:\n\n' +
        '1. [tür] anlam\n2. [tür] anlam\n3. [tür] anlam\n4. [tür] anlam\n' +
        '(varsa) 💡 kısa açıklama';

    var body = {
        contents: [{
            parts: [{ text: prompt }]
        }],
        generationConfig: {
            temperature: 0.3,
            maxOutputTokens: 200
        }
    };

    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + apiKey, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
        btn.classList.remove('loading');
        btn.textContent = '✨ AI';
        if (xhr.status === 200) {
            var resp = JSON.parse(xhr.responseText);
            var text = '';
            try { text = resp.candidates[0].content.parts[0].text; } catch(e) { text = 'Yanıt alınamadı'; }
            var formatted = formatAiResponse(text);
            aiResults[cardIndex] = formatted;
            showAiResult(position, formatted);
        } else {
            var errMsg = 'Hata: ' + xhr.status;
            try { errMsg = JSON.parse(xhr.responseText).error.message; } catch(e) {}
            showAiResult(position, '<strong style="color:#ef4444">⚠️ ' + errMsg + '</strong>');
        }
    };
    xhr.onerror = function() {
        btn.classList.remove('loading');
        btn.textContent = '✨ AI';
        showAiResult(position, '<strong style="color:#ef4444">Bağlantı hatası</strong>');
    };
    xhr.send(JSON.stringify(body));
}

function formatAiResponse(text) {
    var lines = text.trim().split('\n');
    var html = '';
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        // [tür] formatını renklendir
        line = line.replace(/\[([^\]]+)\]/g, '<em>[$1]</em>');
        // Numaralı satırları kalınlaştır
        line = line.replace(/^(\d+)\.\s*/, '<strong>$1.</strong> ');
        // 💡 açıklamayı vurgula
        if (line.indexOf('💡') >= 0) {
            line = '<div style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(168,85,247,0.15)">' + line + '</div>';
        }
        html += line + '<br>';
    }
    return html;
}

function showAiResult(position, html) {
    var el = document.getElementById('ai-result-' + position);
    if (!el) return;
    el.innerHTML = html;
    el.classList.add('visible');
}

// Kelime arama
function doLookup() {
    var input = document.getElementById('search-input');
    var word = input.value.trim();
    if (!word) return;
    if (!apiKey) { showApiModal(); return; }

    var lr = document.getElementById('lookup-result');
    lr.innerHTML = '<div class="lookup-word">' + word.toUpperCase() + '</div>⏳ Sorgulanıyor...';
    lr.classList.add('visible');

    var prompt = 'İngilizce kelime/ifade: "' + word + '"\n\n' +
        'Bu kelimenin/ifadenin Türkçe karşılığını ver. Kurallar:\n' +
        '1. En yaygın 4 anlamını yaz (varsa). Her anlam için kelime türünü belirt (isim, fiil, sıfat vs.)\n' +
        '2. Çok doğal, günlük Türkçe kullan\n' +
        '3. Eğer bu bir deyim/idiom ise kısa ve net açıkla\n' +
        '4. Eğer tek kelimeyle açıklanamıyorsa çok kısa bir açıklama ekle\n' +
        '5. Cevabı şu formatta ver, başka bir şey yazma:\n\n' +
        '1. [tür] anlam\n2. [tür] anlam\n3. [tür] anlam\n4. [tür] anlam\n' +
        '(varsa) 💡 kısa açıklama';

    var body = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.3, maxOutputTokens: 200 } };
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + apiKey, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
        if (xhr.status === 200) {
            var resp = JSON.parse(xhr.responseText);
            var text = '';
            try { text = resp.candidates[0].content.parts[0].text; } catch(e) { text = 'Yanıt alınamadı'; }
            lr.innerHTML = '<button class="close-btn" onclick="closeLookup()">✕</button><div class="lookup-word">' + word.toUpperCase() + '</div>' + formatAiResponse(text);
        } else {
            var errMsg = 'Hata: ' + xhr.status;
            try { errMsg = JSON.parse(xhr.responseText).error.message; } catch(e) {}
            lr.innerHTML = '<button class="close-btn" onclick="closeLookup()">✕</button><strong style="color:#ef4444">⚠️ ' + errMsg + '</strong>';
        }
    };
    xhr.onerror = function() {
        lr.innerHTML = '<button class="close-btn" onclick="closeLookup()">✕</button><strong style="color:#ef4444">Bağlantı hatası</strong>';
    };
    xhr.send(JSON.stringify(body));
    input.value = '';
}

function closeLookup() {
    document.getElementById('lookup-result').classList.remove('visible');
}

document.getElementById('search-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); doLookup(); }
    e.stopPropagation();
});

// Navigation
document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextPair(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevPair(); }
    else if (e.key === 'Home') { e.preventDefault(); showPair(0); }
    else if (e.key === 'End') { e.preventDefault(); showPair(totalPairs - 1); }
});

document.addEventListener('click', function(e) {
    if (e.target.closest('.nav-arrow') || e.target.closest('.card-wrapper') ||
        e.target.closest('.modal') || e.target.closest('.api-btn')) return;
    nextPair();
});

// Sag tik engeli kaldirildi - sayfa yenilenebilir

// Touch
var touchStartX = 0, touchStartY = 0, touchStartTime = 0;
document.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
    touchStartTime = Date.now();
}, { passive: true });

document.addEventListener('touchend', function(e) {
    var dx = touchStartX - e.changedTouches[0].screenX;
    var dy = touchStartY - e.changedTouches[0].screenY;
    var elapsed = Date.now() - touchStartTime;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) && elapsed < 500) {
        if (dx > 0) nextPair(); else prevPair();
    }
}, { passive: true });

initApiModal();
loadCards();
</script>
</body>
</html>
